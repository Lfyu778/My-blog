  <!-- Small side veins -->
  <path d="M50 42 Q42 38 38 40" stroke="#2c5c3b" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M50 52 Q58 48 62 50" stroke="#2c5c3b" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M50 62 Q44 58 40 60" stroke="#2c5c3b" stroke-width="1" fill="none" opacity="0.35"/>
</svg>
